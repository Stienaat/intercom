<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <title>Mini Intercom</title>
  
<style>

.cont {
	display: grid; 
	max-width: 400px; 
	border: 1px solid #3599E4;
	border-radius: 12px;
	padding: 5 px; margin: 10px;
	background: lightyellow;
}

.but {
	margin: 5px;
	border: 1px solid #3599E4";
	border-radius: 12px;
}

</style>


</head>
<body>
  <h1>Mini Intercom</h1>
  <div id="container" class="cont"> 
	<input id="name" class="but" placeholder="jouw naam" />
	<input id="room" class="but" placeholder="room id (bv. 1234)" />
	<input id="pin" class="but" placeholder="PIN" type="password" />

	<button id="join" class="but">Join</button>
	<button id="call" class="but" disabled>Oproepen</button>
	
  </div>

<p id="people"></p>
  <p id="status">Nog niet verbonden</p>

<script src="/socket.io/socket.io.js"></script>
<script>
  const socket = io();
  const roomInput = document.getElementById('room');
  const joinBtn = document.getElementById('join');
  const statusEl = document.getElementById('status');
  
	const nameInput = document.getElementById('name');
	const pinInput = document.getElementById('pin');
	const peopleEl = document.getElementById('people');
	const callBtn = document.getElementById('call');

	let myName = '';
	let remoteName = '';

  let pc;
  let localStream;
  let roomId;

const rtcConfig = {
  iceTransportPolicy: 'relay',
  iceServers: [
    {
      urls: [
        'turn:openrelay.metered.ca:80',
        'turn:openrelay.metered.ca:443',
        'turn:openrelay.metered.ca:443?transport=tcp'
      ],
      username: 'openrelayproject',
      credential: 'openrelayproject'
    }
  ]
};
  async function initMedia() {
    if (localStream) return;

    // 🎤 Microfoon opvragen met ruisonderdrukking
    localStream = await navigator.mediaDevices.getUserMedia({
      audio: {
        echoCancellation: true,
        noiseSuppression: true,
        autoGainControl: true
      },
      video: false
    });

    // 🔊 Microfoon iets stiller zetten (vermindert ruis & blazen)
    const audioTracks = localStream.getAudioTracks();
    audioTracks[0].applyConstraints({
      advanced: [{ volume: 0.7 }]
    });
  }
function createPeerConnection() {
  pc = new RTCPeerConnection(rtcConfig);

  pc.onconnectionstatechange = () => {
    console.log('connectionState:', pc.connectionState);
    statusEl.textContent = 'Status: ' + pc.connectionState;
  };

  pc.oniceconnectionstatechange = () => {
    console.log('iceConnectionState:', pc.iceConnectionState);
  };

  pc.onicecandidate = (event) => {
    if (event.candidate) {
      socket.emit('signal', { roomId, data: { candidate: event.candidate } });
    }
  };

  pc.ontrack = (event) => {
    const [remoteStream] = event.streams;
    let audio = document.getElementById('remoteAudio');
    if (!audio) {
      audio = document.createElement('audio');
      audio.id = 'remoteAudio';
      audio.autoplay = true;
      audio.playsInline = true;
      document.body.appendChild(audio);
    }

    audio.srcObject = remoteStream;
    audio.volume = 0.8;
    statusEl.textContent = 'Audio verbonden';
  };

  localStream.getTracks().forEach((track) => {
    pc.addTrack(track, localStream);
  });
}

  async function makeOffer() {
    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);
    socket.emit('signal', { roomId, data: { description: pc.localDescription } });
  }

  async function handleSignal({ data }) {
    if (data.description) {
      const desc = data.description;
      if (!pc.currentRemoteDescription && desc.type === 'offer') {
        await pc.setRemoteDescription(desc);
        const answer = await pc.createAnswer();
        await pc.setLocalDescription(answer);
        socket.emit('signal', { roomId, data: { description: pc.localDescription } });
      } else if (desc.type === 'answer') {
        await pc.setRemoteDescription(desc);
      }
    } else if (data.candidate) {
      try {
        await pc.addIceCandidate(data.candidate);
      } catch (e) {
        console.error('Error adding ICE candidate', e);
      }
    }
  }

joinBtn.onclick = async () => {
  roomId = roomInput.value.trim();
  const pin = pinInput.value.trim();
  myName = nameInput.value.trim();

  if (!roomId || !pin || !myName) {
    alert('Naam, room en PIN invullen');
    return;
  }

  socket.emit('join-room', {
    roomId,
    pin,
    name: myName
  });

};

socket.on('peer-ready', ({ name }) => {
  console.log('PEER READY RECEIVED:', name);

  remoteName = name;

  peopleEl.textContent = 'Verbonden met: ' + remoteName;

  callBtn.disabled = false;

  statusEl.textContent = remoteName + ' is beschikbaar';
});

  socket.on('signal', handleSignal);
  
  let wakeLock = null;

async function keepScreenAwake() {
  try {
    if ('wakeLock' in navigator) {
      wakeLock = await navigator.wakeLock.request('screen');
      console.log('Wake lock actief');
    }
  } catch (err) {
    console.log('Wake lock mislukt:', err);
  }
}

document.addEventListener('visibilitychange', async () => {
  if (document.visibilityState === 'visible' && wakeLock === null) {
    await keepScreenAwake();
  }
});

callBtn.onclick = async () => {
  await initMedia();
  createPeerConnection();

  socket.emit('call-user', { roomId });
  statusEl.textContent = 'Oproep verstuurd...';
};

socket.on('incoming-call', async ({ from }) => {
  remoteName = from;

  const ok = confirm(from + ' belt je. Opnemen?');

  if (!ok) {
    socket.emit('reject-call', { roomId });
    return;
  }

  await initMedia();
  createPeerConnection();

  socket.emit('accept-call', { roomId });

  statusEl.textContent = 'Oproep aangenomen';
});

socket.on('call-accepted', async () => {
  statusEl.textContent = 'Oproep geaccepteerd';
  await makeOffer();
});

socket.on('room-full', () => {
  alert('Room is bezet');
});

socket.on('waiting', () => {
  statusEl.textContent = 'Wachten op tweede toestel...';
});

socket.on('join-error', (message) => {
  alert(message);
  statusEl.textContent = message;
});

socket.on('room-full', () => {
  alert('Room is bezet');
  statusEl.textContent = 'Room is bezet';
});

socket.on('peer-left', () => {
  statusEl.textContent = 'Andere gebruiker is weg';
  callBtn.disabled = true;
});

socket.on('joined', ({ message }) => {
  statusEl.textContent = message;
});

socket.on('join-error', (message) => {
  alert(message);
  statusEl.textContent = message;
});
  
</script>

</body>
</html>
